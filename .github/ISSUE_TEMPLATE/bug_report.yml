name: Bug report
description: Report a parser or highlighting bug.
title: ""
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: >-
        Search existing issues first. Use the private link in the issue chooser
        for security vulnerabilities.
  - type: textarea
    id: input
    attributes:
      label: Input
      description: Provide the smallest sed script that reproduces the problem.
      render: sed
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include the syntax tree, error, or highlighting result.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Provide the grammar revision and Tree-sitter version.
    validations:
      required: true
  - type: textarea
    id: reference
    attributes:
      label: Reference
      description: Link the relevant specification or implementation behavior.
    validations:
      required: false
